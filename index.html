<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="style.css">
</head>


<body>
  <div class="calculadora">
    <input type="text" id="display" readonly value="">
    <div class="teclado">
      <button class="especial" data-action="limpar">C</button>
      <button class="especial" data-action="apagar">DEL</button>
      <button class="especial" data-value="%">%</button>
      <button class="operador" data-value="/">÷</button>

      <button class="numero" data-value="7">7</button>
      <button class="numero" data-value="8">8</button>
      <button class="numero" data-value="9">9</button>
      <button class="operador" data-value="*">×</button>

      <button class="numero" data-value="4">4</button>
      <button class="numero" data-value="5">5</button>
      <button class="numero" data-value="6">6</button>
      <button class="operador" data-value="-">−</button>

      <button class="numero" data-value="1">1</button>
      <button class="numero" data-value="2">2</button>
      <button class="numero" data-value="3">3</button>
      <button class="operador" data-value="+">+</button>

      <button class="numero" data-value="0">0</button>
      <button class="numero" data-value=".">.</button>
      <button class="igual" data-action="calcular">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
